name: Anchor Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.30.1"
  RUST_VERSION: "1.79.0"
  RUST_STABLE_VERSION: "stable"
  NODE_VERSION: "22"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable for cargo metadata)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust 1.79 (for lockfile generation)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.79.0"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --tag "v${ANCHOR_VERSION}" --locked
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase --force

      - name: Pin dependencies (edition2024 workaround)
        run: bash scripts/pin-deps.sh

      - name: Build program
        run: cargo-build-sbf --manifest-path programs/wager_escrow/Cargo.toml --sbf-out-dir target/deploy

      - name: Generate IDL
        run: npm run generate:idl

      - name: Verify IDL is up-to-date
        run: |
          git diff --exit-code target/idl/wager_escrow.json || {
            echo "ERROR: IDL is out of date. Run 'npm run generate:idl' and commit the result."
            exit 1
          }

      - name: Run Anchor tests
        run: anchor test --skip-build

  nextjs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Generate IDL (for tests)
        run: npm run generate:idl

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (validators, utils, IDL verification, Borsh builders)
        run: npx vitest run

      - name: Build
        run: npm run build
